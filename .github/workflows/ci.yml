name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run validation gates
        run: npm test

      - name: Verify critical docs exist
        run: |
          test -f README.md
          test -f AGENTS.md
          test -f docs/mcp-implementation-guide.md
          test -f openapi/rental-ai.yaml
          echo "✓ All critical files present"
